<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — MyBodyFitness</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark">
<div class="container d-flex justify-content-center align-items-center min-vh-100">
    <div class="card shadow" style="width: 400px;">
        <div class="card-body p-4">
            <h2 class="card-title text-center mb-4">💪 MyBodyFitness</h2>

            <div th:if="${param.erro}" class="alert alert-danger">
                Email ou password incorretos.
            </div>
            <div th:if="${param.logout}" class="alert alert-info">
                Sessão terminada com sucesso.
            </div>
            <div th:if="${param.registado}" class="alert alert-success">
                Conta criada! Podes fazer login agora.
            </div>

            <form th:action="@{/login}" method="post">
                <div class="mb-3">
                    <label for="username" class="form-label">Email</label>
                    <input type="email" id="username" name="username"
                           class="form-control" placeholder="email@exemplo.com" required>
                </div>
                <div class="mb-3">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" id="password" name="password"
                           class="form-control" required>
                </div>
                <button type="submit" class="btn btn-danger w-100">Entrar</button>
            </form>

            <hr>
            <p class="text-center mb-0">
                Não tens conta? <a th:href="@{/registro}">Registar</a>
            </p>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
